app:
  name: teams2issue
  environment: development
  startup_timeout: 10s
  shutdown_timeout: 10s

http:
  address: 127.0.0.1:8080
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 30s
  shutdown_timeout: 10s

logging:
  level: info
  format: json
  add_source: false

metrics:
  enabled: true
  path: /metrics
  namespace: teams2issue

jira:
  base_url: https://jira.example.com
  project_key: DEMO

teams:
  tenant_id: tenant-id
  team_id: team-id
  channel_id: channel-id
  webhook_base_url: https://teams2issue.example.com
  client_state: change-me

oauth2:
  client_id: example-client-id
  client_secret: example-client-secret
  auth_url: https://login.example.com/oauth2/authorize
  token_url: https://login.example.com/oauth2/token
  scopes:
    - offline_access
    - openid
